---
name: code-maven-build-snapshot
run-name: "Publish Snapshot: ${{ github.event_name }}"

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      BASELINE:
        description: 'Branch to publish snapshot from'
        required: true
        default: 'develop'

env:
  MAVEN_OPTS: "-Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn"

jobs:
  publish-snapshot-from-pr:
    name: Publish Snapshot (PR)
    concurrency: code-build-snapshot
    permissions:
      contents: read
      issues: write
      pull-requests: write
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      github.event.comment.body == '/publish-snapshot'
    runs-on: ubuntu-24.04
    steps:
      - name: Validate admin permissions
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor
            });
            const permission = data.permission;
            core.info(`User permission level: ${permission}`);
            if (permission !== 'admin') {
              core.setFailed(`User @${context.actor} is not a repository admin.`);
            }

      - name: Get PR head SHA
        id: pr-head
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('sha', data.head.sha);

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-head.outputs.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Maven Cache
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup asdf Cache
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.asdf/data
          key: ${{ runner.os }}-asdf-${{ hashFiles('**/.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-asdf-

      - name: Validate tool-versions content
        run: |
          if grep -Evq '^[a-zA-Z0-9_-]+ [a-zA-Z0-9._+-]+$' code/.tool-versions; then
            echo "::error::Invalid .tool-versions content detected"
            exit 1
          fi

      - name: Save tool-versions content
        run: |
          {
            echo "TOOL_VERSIONS<<EOF"
            cat code/.tool-versions
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Setup asdf environment
        uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4
        with:
          tool_versions: ${{ env.TOOL_VERSIONS }}

      - name: Setup Java environment vars
        run: |
          JAVA_HOME="$(asdf where java)"
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      - name: Prepare committer information
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.CI_GPG_SECRET_KEY }}
          GPG_PASSPHRASE: ${{ secrets.CI_GPG_SECRET_KEY_PASSWORD }}
        run: |
          git config --global credential.helper store
          cat <<EOT >> ~/.git-credentials
          https://ci-user:$GITHUB_TOKEN@github.com
          EOT

          # GPG: non-interactive signing setup
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          printf 'allow-loopback-pinentry\nallow-preset-passphrase\n' > ~/.gnupg/gpg-agent.conf
          printf 'use-agent\npinentry-mode loopback\n' > ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent || true
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_DATA=$(gpg --list-secret-keys --with-colons)
          echo "$KEY_DATA" | awk -F: '/^grp:/ {print $10}' | while read -r GRIP; do
            /usr/lib/gnupg/gpg-preset-passphrase --preset "$GRIP" <<< "$GPG_PASSPHRASE"
          done

          # Git: identity and signing
          FPR=$(echo "$KEY_DATA" | awk -F: '/^fpr:/ {print $10; exit}')
          git config user.name "srvcosoitxtech"
          git config user.email "oso@inditex.com"
          git config user.signingkey "$FPR"
          git config commit.gpgsign true
          git config tag.gpgsign true

      - name: Build & Deploy Snapshot
        id: deploy
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.CI_GPG_SECRET_KEY_PASSWORD }}
        working-directory: code
        run: |
          mvn -B clean deploy -DskipTests -DskipUTs -DskipITs -DskipEnforceSnapshots=true --settings=.mvn/settings.xml

          # Extract group ID, artifact ID, and version
          GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)

          echo "GROUP_ID=$GROUP_ID" >> "$GITHUB_OUTPUT"
          echo "ARTIFACT_ID=$ARTIFACT_ID" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Comment on PR with result
        if: always()
        uses: actions/github-script@v7
        env:
          GROUP_ID: ${{ steps.deploy.outputs.GROUP_ID }}
          ARTIFACT_ID: ${{ steps.deploy.outputs.ARTIFACT_ID }}
          VERSION: ${{ steps.deploy.outputs.VERSION }}
        with:
          script: |
            const status = '${{ job.status }}';
            const groupId = process.env.GROUP_ID || 'dev.inditex';
            const artifactId = process.env.ARTIFACT_ID || 'unknown';
            const version = process.env.VERSION || '0.0.0-SNAPSHOT';
            const groupPath = groupId.replace(/\./g, '/');

            let body;
            if (status === 'success') {
              const baseUrl = `https://central.sonatype.com/repository/maven-snapshots/${groupPath}/${artifactId}/${version}`;
              body = `### :rocket: Snapshot published: \`${groupId}:${artifactId}:${version}\`

            - [Browse artifacts](${baseUrl}/)
            - [maven-metadata.xml](${baseUrl}/maven-metadata.xml)`;
            } else {
              const workflowUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
              body = `### :x: Snapshot publication failed

            [View workflow logs](${workflowUrl}) for details.`;
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  publish-snapshot-from-dispatch:
    name: Publish Snapshot (Manual)
    concurrency: code-build-snapshot
    permissions:
      contents: read
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Validate admin permissions
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor
            });
            const permission = data.permission;
            core.info(`User permission level: ${permission}`);
            if (permission !== 'admin') {
              core.setFailed(`User @${context.actor} is not a repository admin.`);
            }

      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.BASELINE }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Maven Cache
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup asdf Cache
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.asdf/data
          key: ${{ runner.os }}-asdf-${{ hashFiles('**/.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-asdf-

      - name: Validate tool-versions content
        run: |
          if grep -Evq '^[a-zA-Z0-9_-]+ [a-zA-Z0-9._+-]+$' code/.tool-versions; then
            echo "::error::Invalid .tool-versions content detected"
            exit 1
          fi

      - name: Save tool-versions content
        run: |
          {
            echo "TOOL_VERSIONS<<EOF"
            cat code/.tool-versions
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Setup asdf environment
        uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4
        with:
          tool_versions: ${{ env.TOOL_VERSIONS }}

      - name: Setup Java environment vars
        run: |
          JAVA_HOME="$(asdf where java)"
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      - name: Prepare committer information
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.CI_GPG_SECRET_KEY }}
          GPG_PASSPHRASE: ${{ secrets.CI_GPG_SECRET_KEY_PASSWORD }}
        run: |
          git config --global credential.helper store
          cat <<EOT >> ~/.git-credentials
          https://ci-user:$GITHUB_TOKEN@github.com
          EOT

          # GPG: non-interactive signing setup
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          printf 'allow-loopback-pinentry\nallow-preset-passphrase\n' > ~/.gnupg/gpg-agent.conf
          printf 'use-agent\npinentry-mode loopback\n' > ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent || true
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_DATA=$(gpg --list-secret-keys --with-colons)
          echo "$KEY_DATA" | awk -F: '/^grp:/ {print $10}' | while read -r GRIP; do
            /usr/lib/gnupg/gpg-preset-passphrase --preset "$GRIP" <<< "$GPG_PASSPHRASE"
          done

          # Git: identity and signing
          FPR=$(echo "$KEY_DATA" | awk -F: '/^fpr:/ {print $10; exit}')
          git config user.name "srvcosoitxtech"
          git config user.email "oso@inditex.com"
          git config user.signingkey "$FPR"
          git config commit.gpgsign true
          git config tag.gpgsign true

      - name: Build & Deploy Snapshot
        id: deploy
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.CI_GPG_SECRET_KEY_PASSWORD }}
        working-directory: code
        run: |
          mvn -B clean deploy -DskipTests -DskipUTs -DskipITs -DskipEnforceSnapshots=true --settings=.mvn/settings.xml

          GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)

          echo "GROUP_ID=$GROUP_ID" >> "$GITHUB_ENV"
          echo "ARTIFACT_ID=$ARTIFACT_ID" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Write Job Summary
        if: always()
        env:
          BASELINE: ${{ github.event.inputs.BASELINE }}
        run: |
          GROUP_PATH=$(echo "$GROUP_ID" | tr '.' '/')
          BASE_URL="https://central.sonatype.com/repository/maven-snapshots/${GROUP_PATH}/${ARTIFACT_ID}/${VERSION}"

          if [[ "${{ job.status }}" == "success" ]]; then
            cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ### :rocket: Snapshot published: \`${GROUP_ID}:${ARTIFACT_ID}:${VERSION}\`

          - **Branch:** \`$BASELINE\`
          - [Browse artifacts](${BASE_URL}/)
          - [maven-metadata.xml](${BASE_URL}/maven-metadata.xml)
          EOF
          else
            cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ### :x: Snapshot publication failed

          - **Branch:** \`$BASELINE\`

          Check the workflow logs above for error details.
          EOF
          fi
